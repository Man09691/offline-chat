<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00d4ff" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0d0d1a;
        --surface: #1a1a2e;
        --surface2: #16213e;
        --accent: #00d4ff;
        --accent2: #7b2fff;
        --text: #ffffff;
        --subtext: #8888aa;
        --bubble-me: #0f3460;
        --bubble-other: #1e1e3a;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── JOIN SCREEN ── */
      #join-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow-y: auto;
        gap: 14px;
        padding: 24px;
        animation: fadeIn 0.5s ease;
        scrollbar-width: none;
      }

      .logo {
        font-size: 52px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      #join-screen h1 {
        font-size: 26px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
      }

      #join-screen p {
        color: var(--subtext);
        font-size: 14px;
      }

      #username-input {
        padding: 14px 22px;
        border-radius: 30px;
        border: 2px solid var(--accent);
        background: var(--surface);
        color: var(--text);
        font-size: 16px;
        outline: none;
        width: 280px;
        text-align: center;
        transition:
          border 0.3s,
          box-shadow 0.3s;
      }

      #username-input:focus {
        box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
      }

      #join-btn {
        padding: 14px 48px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
      }

      #join-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(0, 212, 255, 0.5);
      }

      #join-btn:active {
        transform: scale(0.97);
      }

      /* ── CHAT SCREEN ── */
      #chat-screen {
        display: none;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        animation: fadeIn 0.4s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── HEADER ── */
      #header {
        background: var(--surface2);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #0f3460;
      }

      #header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #header-left span {
        font-size: 22px;
      }

      #header-title {
        font-size: 17px;
        font-weight: bold;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      #header-sub {
        font-size: 11px;
        color: var(--subtext);
      }

      #online-badge {
        background: rgba(0, 212, 255, 0.15);
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
      }

      /* ── MESSAGES ── */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        scrollbar-width: thin;
        scrollbar-color: var(--surface2) transparent;
      }

      /* ── TYPING INDICATOR ── */
      #typing-indicator {
        padding: 0 16px 8px;
        font-size: 12px;
        color: var(--subtext);
        min-height: 22px;
        font-style: italic;
        transition: opacity 0.3s;
      }

      /* ── MESSAGE BUBBLES ── */
      .message {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.5;
        animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.85);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .message .name {
        font-size: 11px;
        font-weight: bold;
        margin-bottom: 4px;
        color: var(--accent);
      }

      .message .time {
        font-size: 10px;
        color: var(--subtext);
        margin-top: 4px;
        text-align: right;
      }

      .message.mine {
        background: linear-gradient(135deg, #0f3460, #1a2a5e);
        align-self: flex-end;
        border-bottom-right-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .message.others {
        background: var(--bubble-other);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .system-msg {
        text-align: center;
        font-size: 12px;
        color: var(--subtext);
        padding: 4px 12px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 20px;
        align-self: center;
        animation: fadeIn 0.3s ease;
      }

      /* ── INPUT AREA ── */
      #input-area {
        display: flex;
        padding: 12px 16px;
        gap: 10px;
        background: var(--surface2);
        border-top: 1px solid #0f3460;
      }

      #message-input {
        flex: 1;
        padding: 12px 18px;
        border-radius: 25px;
        border: 1px solid #0f3460;
        background: var(--surface);
        color: var(--text);
        font-size: 15px;
        outline: none;
        transition:
          border 0.3s,
          box-shadow 0.3s;
      }

      #message-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
      }

      #send-btn {
        padding: 12px 22px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        color: white;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        font-size: 18px;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
      }

      #send-btn:hover {
        transform: scale(1.05);
      }
      #send-btn:active {
        transform: scale(0.95);
      }

      #qr-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 16px;
        padding: 16px 24px;
      }

      #qr-label {
        font-size: 12px;
        color: var(--subtext);
      }

      #qr-code {
        background: white;
        padding: 10px;
        border-radius: 10px;
      }

      #qr-url {
        font-size: 11px;
        color: var(--accent);
        letter-spacing: 0.5px;
      }

      #file-btn {
        padding: 12px 14px;
        background: var(--surface);
        border: 1px solid #0f3460;
        border-radius: 25px;
        cursor: pointer;
        font-size: 16px;
        transition: transform 0.2s;
      }

      #file-btn:hover {
        transform: scale(1.1);
      }

      .file-message {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 18px;
        animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .file-message.mine {
        background: linear-gradient(135deg, #0f3460, #1a2a5e);
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }

      .file-message.others {
        background: var(--bubble-other);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }

      .file-message .name {
        font-size: 11px;
        font-weight: bold;
        margin-bottom: 6px;
        color: var(--accent);
      }

      .file-message img {
        max-width: 200px;
        max-height: 200px;
        border-radius: 10px;
        display: block;
        cursor: pointer;
      }

      .file-message .file-info {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }

      .file-message .file-icon {
        font-size: 24px;
      }

      .file-message .file-name {
        font-size: 13px;
        color: var(--text);
        word-break: break-all;
      }

      .file-message .download-btn {
        margin-top: 8px;
        padding: 6px 14px;
        background: var(--accent);
        color: #1a1a2e;
        border: none;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        cursor: pointer;
        display: block;
      }

      .file-message .time {
        font-size: 10px;
        color: var(--subtext);
        margin-top: 6px;
        text-align: right;
      }
      .file-size {
        font-size: 11px;
        color: var(--subtext);
        margin-top: 4px;
      }

      #preview-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      #preview-box {
        background: var(--surface2);
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 20px;
        padding: 24px;
        width: 85%;
        max-width: 320px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      #preview-title {
        font-size: 16px;
        font-weight: bold;
        color: var(--accent);
      }

      #preview-content img {
        max-width: 200px;
        max-height: 200px;
        border-radius: 12px;
        object-fit: cover;
      }

      #preview-content .file-preview-icon {
        font-size: 56px;
        text-align: center;
      }

      #preview-info {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      #preview-name {
        font-size: 13px;
        color: var(--text);
        word-break: break-all;
        text-align: center;
      }

      #preview-size {
        font-size: 12px;
        color: var(--subtext);
      }

      #preview-buttons {
        display: flex;
        gap: 12px;
        width: 100%;
      }

      #preview-cancel {
        flex: 1;
        padding: 12px;
        background: transparent;
        border: 1px solid var(--subtext);
        border-radius: 25px;
        color: var(--subtext);
        font-size: 14px;
        cursor: pointer;
      }

      #preview-send {
        flex: 1;
        padding: 12px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border: none;
        border-radius: 25px;
        color: white;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
      }

      #users-panel {
        background: var(--surface2);
        border-bottom: 1px solid #0f3460;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
      }

      #users-panel::-webkit-scrollbar {
        display: none;
      }

      .user-chip {
        padding: 4px 12px;
        background: rgba(0, 212, 255, 0.1);
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 20px;
        font-size: 12px;
        color: var(--accent);
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.2s;
      }

      .user-chip:hover {
        background: rgba(0, 212, 255, 0.25);
        transform: scale(1.05);
      }

      .user-chip.selected {
        background: var(--accent);
        color: #1a1a2e;
        font-weight: bold;
      }

      #private-indicator {
        padding: 4px 16px;
        font-size: 12px;
        color: #ffaa00;
        background: rgba(255, 170, 0, 0.1);
        border-top: 1px solid rgba(255, 170, 0, 0.2);
        display: none;
        align-items: center;
        justify-content: space-between;
      }

      #cancel-private {
        background: none;
        border: none;
        color: #ffaa00;
        cursor: pointer;
        font-size: 12px;
        font-weight: bold;
      }

      .private-bubble {
        border-left: 3px solid #ffaa00 !important;
      }

      .private-tag {
        font-size: 10px;
        color: #ffaa00;
        margin-bottom: 3px;
      }

      /* ── LOCK ICON ── */
      .msg-lock {
        font-size: 10px;
        margin-left: 4px;
        opacity: 0.75;
        vertical-align: middle;
        user-select: none;
        cursor: default;
      }

      /* ── SEARCH HIGHLIGHT ── */
      .search-hidden {
        opacity: 0.15;
        transition: opacity 0.2s;
      }

      .search-match {
        opacity: 1 !important;
        transition: opacity 0.2s;
      }

      mark {
        background: #ffdd00;
        color: #000000;
        border-radius: 3px;
        padding: 0 2px;
      }

      /* ── EMOJI REACTIONS ── */
      .reaction-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 6px;
      }

      .reaction-btn:hover {
        background: rgba(255, 255, 255, 0.18);
        transform: scale(1.15);
      }

      .reaction-btn.mine {
        border-color: var(--accent);
        background: rgba(0, 212, 255, 0.15);
      }

      .reaction-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 6px;
      }

      .reaction-pill {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 2px 8px;
        font-size: 12px;
        cursor: default;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 3px;
        transition: transform 0.15s;
      }

      .reaction-pill.reacted-by-me {
        border-color: var(--accent);
        background: rgba(0, 212, 255, 0.15);
      }

      .reaction-pill .pill-count {
        font-size: 11px;
        opacity: 0.85;
      }

      .emoji-picker {
        display: none;
        gap: 6px;
        margin-top: 6px;
        background: var(--surface2);
        border: 1px solid #0f3460;
        border-radius: 20px;
        padding: 6px 10px;
        width: fit-content;
        position: relative;
        z-index: 10;
      }

      .emoji-picker span {
        font-size: 18px;
        cursor: pointer;
        transition: transform 0.15s;
        user-select: none;
        display: inline-block;
      }

      .emoji-picker span:hover {
        transform: scale(1.3);
      }

      .emoji-picker span.already-mine {
        outline: 2px solid var(--accent);
        border-radius: 4px;
      }

      .emoji-picker span {
        font-size: 18px;
        cursor: pointer;
        transition: transform 0.15s;
        user-select: none;
      }

      .emoji-picker span:hover {
        transform: scale(1.3);
      }

      /* ── NEW USER HIGHLIGHT DURING SEARCH ── */
      .user-chip.new-arrival {
        background: rgba(123, 47, 255, 0.35);
        border-color: var(--accent2);
        color: #ffffff;
        animation: chipPulse 1s ease infinite;
      }

      @keyframes chipPulse {
        0%,
        100% {
          box-shadow: 0 0 0px rgba(123, 47, 255, 0.4);
        }
        50% {
          box-shadow: 0 0 10px rgba(123, 47, 255, 0.9);
        }
      }

      /* ── READ RECEIPTS ── */
      .msg-status {
        font-size: 11px;
        margin-left: 4px;
        font-weight: bold;
        transition: color 0.3s;
      }

      /* Sending → grey single tick */
      .msg-status.sending {
        color: #888888;
      }

      /* Sent → white single tick */
      .msg-status.sent {
        color: #ffffff;
      }

      /* Delivered → grey double tick */
      .msg-status.delivered {
        color: #888888;
      }

      /* Seen → blue double tick */
      .msg-status {
        color: var(--subtext); /* grey by default */
      }
      .msg-status.seen {
        color: #4fc3f7; /* blue only when seen */
      }
    </style>
  </head>
  <body>
    <!-- JOIN SCREEN -->
    <div id="join-screen">
      <div class="logo">📡</div>
      <h1>Offline Chat</h1>
      <p>No internet • No server • Just WiFi</p>

      <!-- QR CODE BOX -->
      <div id="qr-container">
        <p id="qr-label">Scan to join from another device</p>
        <div id="qr-code"></div>
        <p id="qr-url"></p>
      </div>

      <input
        id="username-input"
        type="text"
        placeholder="Enter your name"
        maxlength="20"
      />
      <select
        id="room-select"
        style="
          padding: 12px 22px;
          border-radius: 30px;
          border: 2px solid var(--accent);
          background: var(--surface);
          color: var(--text);
          font-size: 15px;
          outline: none;
          width: 280px;
          text-align: center;
        "
      >
        <option value="general">📢 General</option>
        <option value="help">🆘 Help</option>
        <option value="location">📍 Location</option>
        <option value="random">💬 Random</option>
      </select>
      <button id="join-btn">Join Chat →</button>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat-screen">
      <div id="header">
        <div id="header-left">
          <span>📡</span>
          <div>
            <div id="header-title">Offline Chat</div>
            <div id="room-label" style="font-size: 11px; color: var(--accent)">
              # general
            </div>
            <div id="header-sub">No Internet Used</div>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 8px">
          <button
            id="search-btn"
            style="
              background: none;
              border: none;
              color: var(--accent);
              font-size: 18px;
              cursor: pointer;
              padding: 4px 8px;
              border-radius: 50%;
              transition: background 0.2s;
            "
          >
            🔍
          </button>
          <div id="online-badge">
            🟢 <span id="online-count">1</span> online
          </div>
        </div>
      </div>

      <!-- SEARCH BAR -->
      <div
        id="search-bar"
        style="
          display: none;
          padding: 8px 16px;
          background: var(--surface2);
          border-bottom: 1px solid #0f3460;
          gap: 8px;
          align-items: center;
        "
      >
        <input
          id="search-input"
          type="text"
          placeholder="Search messages or names..."
          style="
            flex: 1;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            outline: none;
          "
        />
        <button
          id="search-clear"
          style="
            background: none;
            border: none;
            color: var(--subtext);
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
          "
        >
          ✕
        </button>
      </div>

      <!-- ONLINE USERS PANEL -->
      <div id="users-panel">
        <div id="users-list"></div>
      </div>

      <div
        id="room-banner"
        style="
          padding: 6px 16px;
          font-size: 12px;
          color: var(--subtext);
          background: rgba(0, 212, 255, 0.05);
          border-bottom: 1px solid rgba(0, 212, 255, 0.1);
          text-align: center;
          display: none;
        "
      ></div>

      <div id="private-indicator">
        <span id="private-label"
          >🔒 Private message to: <b id="private-name"></b
        ></span>
        <button id="cancel-private">✕ Cancel</button>
      </div>

      <div id="messages"></div>
      <div id="typing-indicator"></div>

      <div id="input-area">
        <input
          id="file-input"
          type="file"
          accept="image/*,.pdf,.txt,.doc,.docx"
          style="display: none"
        />
        <button id="file-btn">📎</button>
        <input id="message-input" type="text" placeholder="Type a message..." />
        <button id="send-btn">➤</button>
      </div>
    </div>

    <!-- FILE PREVIEW MODAL -->
    <div id="preview-modal">
      <div id="preview-box">
        <p id="preview-title">Send this file?</p>
        <div id="preview-content"></div>
        <div id="preview-info">
          <span id="preview-name"></span>
          <span id="preview-size"></span>
        </div>
        <div id="preview-buttons">
          <button id="preview-cancel">Cancel</button>
          <button id="preview-send">Send ✓</button>
        </div>
      </div>
    </div>

    <script>
      const socket = io();

      // ── CRYPTO SETUP ──
      let myPublicKey = null;
      let myPrivateKey = null;
      let otherPublicKeys = {};
      let privateTarget = null;
      let historyLoaded = new Set();

      const encryptionSupported = window.crypto && window.crypto.subtle;

      async function generateKeyPair() {
        if (!encryptionSupported) return;
        const keyPair = await window.crypto.subtle.generateKey(
          {
            name: "RSA-OAEP",
            modulusLength: 2048,
            publicExponent: new Uint8Array([1, 0, 1]),
            hash: "SHA-256",
          },
          true,
          ["encrypt", "decrypt"],
        );
        myPublicKey = keyPair.publicKey;
        myPrivateKey = keyPair.privateKey;
        console.log("🔑 Key pair generated!");
      }

      async function exportPublicKey(key) {
        const exported = await window.crypto.subtle.exportKey("spki", key);
        return btoa(String.fromCharCode(...new Uint8Array(exported)));
      }

      async function importPublicKey(keyStr) {
        const keyData = Uint8Array.from(atob(keyStr), (c) => c.charCodeAt(0));
        return await window.crypto.subtle.importKey(
          "spki",
          keyData,
          { name: "RSA-OAEP", hash: "SHA-256" },
          true,
          ["encrypt"],
        );
      }

      async function encryptMessage(message, publicKey) {
        if (!encryptionSupported || !publicKey) return message;
        const encoded = new TextEncoder().encode(message);
        const encrypted = await window.crypto.subtle.encrypt(
          { name: "RSA-OAEP" },
          publicKey,
          encoded,
        );
        return btoa(String.fromCharCode(...new Uint8Array(encrypted)));
      }

      async function decryptMessage(encryptedMessage) {
        if (!encryptionSupported || !myPrivateKey) return encryptedMessage;
        const encryptedData = Uint8Array.from(atob(encryptedMessage), (c) =>
          c.charCodeAt(0),
        );
        const decrypted = await window.crypto.subtle.decrypt(
          { name: "RSA-OAEP" },
          myPrivateKey,
          encryptedData,
        );
        return new TextDecoder().decode(decrypted);
      }

      // ── FORMAT FILE SIZE ──
      function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      }

      async function joinChat() {

      // ── GENERATE ID ──

      async function sendMessage() {
        const input = document.getElementById("message-input");
        const text = input.value.trim();
        if (!text) return;

        const baseData = {
          id: generateID(),
          username: username,
          text: text,
          time: new Date().toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          }),
          hops: 0,
          maxHops: 5,
          room: currentRoom,
        };

        if (privateTarget) {
          // ── PRIVATE MESSAGE ──
          const privateData = { ...baseData, private: true, to: privateTarget };
          const willEncrypt =
            encryptionSupported && otherPublicKeys[privateTarget];

          addMessage(
            {
              ...privateData,
              text: `🔒 Private to ${privateTarget}: ${text}`,
              encrypted: willEncrypt,
            },

            true,
            true,
          );

          // ✅ ADD THIS
          savePrivateMessage(privateTarget, {
            id: baseData.id,
            from: username,
            text: text,
            time: baseData.time,
          });

          if (willEncrypt) {
            const encryptedText = await encryptMessage(
              text,
              otherPublicKeys[privateTarget],
            );
            socket.emit("chat message", {
              ...privateData,
              text: encryptedText,
              encrypted: true,
            });
          } else {
            socket.emit("chat message", privateData);
          }
        } else {
          // ── GROUP MESSAGE ──
          const hasRecipients =
            encryptionSupported && Object.keys(otherPublicKeys).length > 0;
          addMessage({ ...baseData, encrypted: hasRecipients }, true);

          if (hasRecipients) {
            for (const [user, publicKey] of Object.entries(otherPublicKeys)) {
              try {
                const encryptedText = await encryptMessage(text, publicKey);
                socket.emit("chat message", {
                  ...baseData,
                  id: baseData.id, // ← use SAME id as display bubble
                  text: encryptedText,
                  encrypted: true,
                  to: user,
                });
              } catch (err) {
                console.error(`Encryption failed for ${user}:`, err);
              }
            }
          } else {
            socket.emit("chat message", baseData);
          }
        }

        socket.emit("stop typing");
        input.value = "";
      }

      // ── RECEIVE MESSAGE — SINGLE LISTENER ONLY ✅ ──
      socket.on("chat message", async (data) => {
        // Relay DMs not meant for me
        if (data.to && data.to !== username) {
          socket.emit("chat message", data);
          return;
        }
        // Ignore messages from other rooms
        if (!data.to && data.room && data.room !== currentRoom) return;

        let messageText = data.text;
        let encryptionStatus = "unencrypted";

        if (data.encrypted && encryptionSupported) {
          encryptionStatus = "pending";
          const displayData = { ...data, text: "⏳ Decrypting..." };
          addMessage(displayData, false, data.private);
          updateEncryptionStatus(data.id, "pending");

          try {
            messageText = await decryptMessage(data.text);
            encryptionStatus = "encrypted";
          } catch (err) {
            messageText = "Could not decrypt message";
            encryptionStatus = "failed";
          }

          // Update bubble text and icon after decryption
          const msgEl = document.querySelector(
            `[data-msgid="${data.id}"] .msg-text`,
          );
          if (msgEl) msgEl.textContent = messageText;
          updateEncryptionStatus(data.id, encryptionStatus);
        } else {
          const displayData = { ...data, text: messageText };
          addMessage(displayData, false, data.private);
          updateEncryptionStatus(data.id, "unencrypted");
        }

        // ✅ ADD THIS
        if (data.private) {
          savePrivateMessage(data.username, {
            id: data.id,
            from: data.username,
            text: messageText,
            time: data.time,
          });
        }
        playSound();

        // Tell sender message was delivered
        socket.emit("message delivered", {
          messageId: data.id,
          sentBy: data.username,
          deliveredTo: username,
        });
        // Tell sender message was seen
        // Tell sender only if tab is visible right now
        if (document.visibilityState === "visible") {
          socket.emit("message seen confirmed", {
            messageId: data.id,
            sentBy: data.username,
          });
        } else {
          // Tab is hidden — wait until user comes back
          const handler = () => {
            socket.emit("message seen confirmed", {
              messageId: data.id,
              sentBy: data.username,
            });
            document.removeEventListener("visibilitychange", handler);
          };
          document.addEventListener("visibilitychange", handler);
        }
      });

      // ── RELAY CONFIRMATION ──
      socket.on("message relayed", (data) => {
        console.log(`✅ Relayed — hop ${data.hops}`);
        const statusEl = document.querySelector(
          `[data-msgid-status="${data.id}"]`,

          statusEl.title = "Sent";

      // ── DELIVERY CONFIRMED ──

        );

          statusEl.classList.add("delivered");
          statusEl.textContent = "✓✓";
          statusEl.title = "Delivered";
        }
      });

      socket.on("message seen confirmed", (data) => {
        const statusEl = document.querySelector(
          `[data-msgid-status="${data.messageId}"]`,
        );
        if (statusEl) {
          statusEl.classList.remove("sending", "sent", "delivered");
          statusEl.classList.add("seen");

      socket.on("peer count", (data) => {

      // ── ADD MESSAGE TO SCREEN ──
      function addMessage(data, isMe, isPrivate = false) {
        const messages = document.getElementById("messages");
        const div = document.createElement("div");

        if (data.private || isPrivate) div.classList.add("private-bubble");

        const statusHTML = isMe
          ? `<span class="msg-status sending" data-msgid-status="${msgId}">✓</span>`

        div.innerHTML = `

                ${data.time}

        div.addEventListener("click", (e) => {

          const bar = div.querySelector(".reaction-bar");

          bar.querySelectorAll(".reaction-pill").forEach((pill) => {
            if (pill.dataset.reactedByMe === "true") {
              previousEmoji = pill.dataset.emoji;
            }
          });

          if (previousEmoji === emoji) {
            div.querySelector(".emoji-picker").style.display = "none";
            return;

          socket.emit("reaction", {
            messageId: msgId,
            emoji,
            username,
            previousEmoji,
          });
          div.querySelector(".emoji-picker").style.display = "none";
        });

        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      function openPicker(div) {
        const picker = div.querySelector(".emoji-picker");
        const isOpen = picker.style.display === "flex";
        document
          .querySelectorAll(".emoji-picker")
          .forEach((p) => (p.style.display = "none"));

      // ── SYSTEM MESSAGES ──
      socket.on("user joined", (name) => {

      });

      socket.on("user left", (name) => {

      // ── REACTIONS ──
      socket.on("reaction", (data) => {
        const bubble = document.querySelector(
          `[data-msgid="${data.messageId}"]`,
        );
        if (!bubble) return;

        const bar = bubble.querySelector(".reaction-bar");

        if (data.previousEmoji) {
          const prevPill = bar.querySelector(
            `.reaction-pill[data-emoji="${data.previousEmoji}"]`,
          );
          if (prevPill) {
            const prevCount = parseInt(prevPill.dataset.count) - 1;
            if (prevCount <= 0) {
              prevPill.remove();
            } else {
              prevPill.dataset.count = prevCount;
              prevPill.querySelector(".pill-count").textContent = prevCount;
              if (data.username === username) {
                prevPill.dataset.reactedByMe = "false";
                prevPill.classList.remove("reacted-by-me");
              }
            }
          }
        }

        const existing = bar.querySelector(
          `.reaction-pill[data-emoji="${data.emoji}"]`,
        );
        if (existing) {
          const newCount = parseInt(existing.dataset.count) + 1;
          existing.dataset.count = newCount;
          existing.querySelector(".pill-count").textContent = newCount;
          if (data.username === username) {
            existing.dataset.reactedByMe = "true";
            existing.classList.add("reacted-by-me");
          }
        } else {
          const pill = document.createElement("div");
          pill.classList.add("reaction-pill");
          pill.dataset.emoji = data.emoji;
          pill.dataset.count = "1";
          if (data.username === username) {
            pill.dataset.reactedByMe = "true";
            pill.classList.add("reacted-by-me");
          }
          pill.innerHTML = `<span>${data.emoji}</span><span class="pill-count">1</span>`;
          bar.appendChild(pill);
        }

        if (data.username === username) {
          bubble.querySelectorAll(".emoji-picker span").forEach((span) => {
            span.classList.remove("already-mine");
            if (span.dataset.emoji === data.emoji)
              span.classList.add("already-mine");
          });
        }
      });

      // ── SOUND NOTIFICATION ──
      // ── SHARED AUDIO CONTEXT ──
      let audioCtx = null;

      function getAudioContext() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }
        return audioCtx;
      }

      // Unlock on first touch
      document.addEventListener(
        "touchstart",
        () => {
          getAudioContext();
        },
        { once: true },
      );

      function playSound() {
        try {
          const ctx = getAudioContext();

          // Chime frequencies (iMessage-like)
          const notes = [
            { freq: 1318.5, time: 0 }, // E6
            { freq: 1567.98, time: 0.08 }, // G6
            { freq: 2093.0, time: 0.16 }, // C7
          ];

          notes.forEach(({ freq, time }) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.type = "sine";
            osc.frequency.setValueAtTime(freq, ctx.currentTime + time);

            gain.gain.setValueAtTime(0, ctx.currentTime + time);
            gain.gain.linearRampToValueAtTime(
              0.15,
              ctx.currentTime + time + 0.02,
            );
            gain.gain.exponentialRampToValueAtTime(
              0.001,
              ctx.currentTime + time + 0.3,
            );

            osc.start(ctx.currentTime + time);
            osc.stop(ctx.currentTime + time + 0.35);
          });
        } catch (e) {
          console.log("Sound error:", e);
        }
      }
      // ── UNLOCK AUDIO ON MOBILE ──
      let audioUnlocked = false;

      document.addEventListener(
        "touchstart",
        () => {
          if (audioUnlocked) return;
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const buf = ctx.createBuffer(1, 1, 22050);
          const src = ctx.createBufferSource();
          src.buffer = buf;
          src.connect(ctx.destination);
          src.start(0);
          audioUnlocked = true;
          console.log("🔊 Audio unlocked on mobile");
        },
        { once: false },
      );

      // ── MESSAGE SEARCH ──
      const searchBtn = document.getElementById("search-btn");
      const searchBar = document.getElementById("search-bar");
      const searchInput = document.getElementById("search-input");
      const searchClear = document.getElementById("search-clear");

      searchBtn.addEventListener("click", () => {
        const isOpen = searchBar.style.display === "flex";
        if (isOpen) {
          closeSearch();
        } else {
          searchBar.style.display = "flex";
          searchInput.focus();
        }
      });

      searchClear.addEventListener("click", closeSearch);

      function closeSearch() {
        searchBar.style.display = "none";
        searchInput.value = "";
        resetSearch();
      }

      function resetSearch() {
        document.querySelectorAll(".message").forEach((msg) => {
          msg.classList.remove("search-hidden", "search-match");
          const textDiv = msg.querySelector(".msg-text");
          if (textDiv && textDiv.dataset.original) {
            textDiv.innerHTML = textDiv.dataset.original;
          }
          const nameDiv = msg.querySelector(".name");
          if (nameDiv && nameDiv.dataset.original) {
            nameDiv.innerHTML = nameDiv.dataset.original;
          }
        });
      }

      searchInput.addEventListener("input", () => {
        const query = searchInput.value.trim().toLowerCase();
        if (!query) {
          resetSearch();
          return;
        }

        document.querySelectorAll(".message").forEach((msg) => {
          const textDiv = msg.querySelector(".msg-text");
          const nameDiv = msg.querySelector(".name");

          if (textDiv && !textDiv.dataset.original)
            textDiv.dataset.original = textDiv.innerHTML;
          if (nameDiv && !nameDiv.dataset.original)
            nameDiv.dataset.original = nameDiv.innerHTML;

          const rawText = (textDiv?.dataset.original || "").toLowerCase();
          const rawName = (nameDiv?.dataset.original || "").toLowerCase();

          const matchesText = rawText.includes(query);
          const matchesName = rawName.includes(query);

          if (matchesText || matchesName) {
            msg.classList.remove("search-hidden");
            msg.classList.add("search-match");
            if (textDiv && matchesText)
              textDiv.innerHTML = highlightText(
                textDiv.dataset.original,
                query,
              );
            if (nameDiv && matchesName)
              nameDiv.innerHTML = highlightText(
                nameDiv.dataset.original,
                query,
              );
          } else {
            msg.classList.add("search-hidden");
            msg.classList.remove("search-match");
            if (textDiv && textDiv.dataset.original)
              textDiv.innerHTML = textDiv.dataset.original;
            if (nameDiv && nameDiv.dataset.original)
              nameDiv.innerHTML = nameDiv.dataset.original;
          }
        });
      });

      function highlightText(original, query) {
        const plain = original
          .replace(/<mark>/gi, "")
          .replace(/<\/mark>/gi, "");
        const regex = new RegExp(
          `(${query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`,
          "gi",
        );
        return plain.replace(regex, "<mark>$1</mark>");
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeSearch();
      });

      function savePrivateMessage(contact, msgObj) {
        const key = `pm_${username}_${contact}`;
        const history = JSON.parse(localStorage.getItem(key) || "[]");
        history.push(msgObj);
        if (history.length > 200) history.splice(0, history.length - 200);
        localStorage.setItem(key, JSON.stringify(history));
      }

      function loadPrivateHistory(contact) {
        const key = `pm_${username}_${contact}`;
        const history = JSON.parse(localStorage.getItem(key) || "[]");
        history.forEach((msg) => {
          addMessage(
            {
              id: msg.id || generateID(),
              username: msg.from,
              text: msg.text,
              time: msg.time,
              private: true,
            },
            msg.from === username,
            true,
          );
        });
      }

      function updateEncryptionStatus(msgId, status) {
        const lockEl = document.querySelector(
          `[data-msgid="${msgId}"] .msg-lock`,
        );
        if (!lockEl) return;

        if (status === "encrypted") {
          lockEl.textContent = "🔒";
          lockEl.style.color = "#4caf50";
          lockEl.title = "End-to-end encrypted";
        } else if (status === "unencrypted") {
          lockEl.textContent = "🔓";
          lockEl.style.color = "#f44336";
          lockEl.title = "Not encrypted";
        } else if (status === "failed") {
          lockEl.textContent = "⚠️";
          lockEl.style.color = "#ff9800";
          lockEl.title = "Decryption failed";
        } else if (status === "pending") {
          lockEl.textContent = "⏳";
          lockEl.style.color = "#999";
          lockEl.title = "Decrypting...";
        }
      }
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("/service-worker.js")
          .then(() => console.log("✅ Service worker registered"))
          .catch((err) => console.log("❌ SW error:", err));
      }
    </script>
  </body>
</html>
