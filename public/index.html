<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline Chat</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0d0d1a;
        --surface: #1a1a2e;
        --surface2: #16213e;
        --accent: #00d4ff;
        --accent2: #7b2fff;
        --text: #ffffff;
        --subtext: #8888aa;
        --bubble-me: #0f3460;
        --bubble-other: #1e1e3a;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── JOIN SCREEN ── */
      #join-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 20px;
        padding: 24px;
        animation: fadeIn 0.5s ease;
      }

      .logo {
        font-size: 52px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      #join-screen h1 {
        font-size: 26px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
      }

      #join-screen p {
        color: var(--subtext);
        font-size: 14px;
      }

      #username-input {
        padding: 14px 22px;
        border-radius: 30px;
        border: 2px solid var(--accent);
        background: var(--surface);
        color: var(--text);
        font-size: 16px;
        outline: none;
        width: 280px;
        text-align: center;
        transition:
          border 0.3s,
          box-shadow 0.3s;
      }

      #username-input:focus {
        box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
      }

      #join-btn {
        padding: 14px 48px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
      }

      #join-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(0, 212, 255, 0.5);
      }

      #join-btn:active {
        transform: scale(0.97);
      }

      /* ── CHAT SCREEN ── */
      #chat-screen {
        display: none;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        animation: fadeIn 0.4s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── HEADER ── */
      #header {
        background: var(--surface2);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #0f3460;
      }

      #header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #header-left span {
        font-size: 22px;
      }

      #header-title {
        font-size: 17px;
        font-weight: bold;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      #header-sub {
        font-size: 11px;
        color: var(--subtext);
      }

      #online-badge {
        background: rgba(0, 212, 255, 0.15);
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
      }

      /* ── MESSAGES ── */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        scrollbar-width: thin;
        scrollbar-color: var(--surface2) transparent;
      }

      /* ── TYPING INDICATOR ── */
      #typing-indicator {
        padding: 0 16px 8px;
        font-size: 12px;
        color: var(--subtext);
        min-height: 22px;
        font-style: italic;
        transition: opacity 0.3s;
      }

      /* ── MESSAGE BUBBLES ── */
      .message {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.5;
        animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.85);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .message .name {
        font-size: 11px;
        font-weight: bold;
        margin-bottom: 4px;
        color: var(--accent);
      }

      .message .time {
        font-size: 10px;
        color: var(--subtext);
        margin-top: 4px;
        text-align: right;
      }

      .message.mine {
        background: linear-gradient(135deg, #0f3460, #1a2a5e);
        align-self: flex-end;
        border-bottom-right-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .message.others {
        background: var(--bubble-other);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .system-msg {
        text-align: center;
        font-size: 12px;
        color: var(--subtext);
        padding: 4px 12px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 20px;
        align-self: center;
        animation: fadeIn 0.3s ease;
      }

      /* ── INPUT AREA ── */
      #input-area {
        display: flex;
        padding: 12px 16px;
        gap: 10px;
        background: var(--surface2);
        border-top: 1px solid #0f3460;
      }

      #message-input {
        flex: 1;
        padding: 12px 18px;
        border-radius: 25px;
        border: 1px solid #0f3460;
        background: var(--surface);
        color: var(--text);
        font-size: 15px;
        outline: none;
        transition:
          border 0.3s,
          box-shadow 0.3s;
      }

      #message-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
      }

      #send-btn {
        padding: 12px 22px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        color: white;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        font-size: 18px;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
      }

      #send-btn:hover {
        transform: scale(1.05);
      }
      #send-btn:active {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <!-- JOIN SCREEN -->
    <div id="join-screen">
      <div class="logo">📡</div>
      <h1>Offline Chat</h1>
      <p>No internet • No server • Just WiFi</p>
      <input
        id="username-input"
        type="text"
        placeholder="Enter your name"
        maxlength="20"
      />
      <button id="join-btn">Join Chat →</button>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat-screen">
      <div id="header">
        <div id="header-left">
          <span>📡</span>
          <div>
            <div id="header-title">Offline Chat</div>
            <div id="header-sub">No Internet Used</div>
          </div>
        </div>
        <div id="online-badge">🟢 <span id="online-count">1</span> online</div>
      </div>

      <div id="messages"></div>
      <div id="typing-indicator"></div>

      <div id="input-area">
        <input id="message-input" type="text" placeholder="Type a message..." />
        <button id="send-btn">➤</button>
      </div>
    </div>

    <script>
      const socket = io();
      let username = "";
      let typingTimeout;

      // ── JOIN ──
      document.getElementById("join-btn").addEventListener("click", joinChat);
      document
        .getElementById("username-input")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") joinChat();
        });

      function joinChat() {
        const input = document.getElementById("username-input").value.trim();
        if (!input) return;
        username = input;
        document.getElementById("join-screen").style.display = "none";
        document.getElementById("chat-screen").style.display = "flex";
        socket.emit("user joined", username);
      }

      // ── GENERATE UNIQUE ID ──
      function generateID() {
        return Math.random().toString(36).substr(2, 9) + Date.now();
      }

      // ── SEND MESSAGE ──
      document
        .getElementById("send-btn")
        .addEventListener("click", sendMessage);
      document
        .getElementById("message-input")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") sendMessage();
        });

      function sendMessage() {
        const input = document.getElementById("message-input");
        const text = input.value.trim();
        if (!text) return;
        const data = {
          id: generateID(),
          username: username,
          text: text,
          time: new Date().toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          }),
          hops: 0,
          maxHops: 5,
        };

        addMessage(data, true); // ← must be BEFORE input.value = ''
        socket.emit("chat message", data);
        socket.emit("stop typing");
        input.value = ""; // ← clears AFTER
      }

      // ── RECEIVE MESSAGE ──
      // This only fires for messages from OTHER people
      // because server uses socket.broadcast.emit
      socket.on("chat message", (data) => {
        // Show message on screen
        addMessage(data, false);
        playSound();

        // Relay forward — this device now acts as a node
        socket.emit("chat message", data);
      });

      // ── RELAY CONFIRMATION ──
      socket.on("message relayed", (data) => {
        console.log(`✅ Relayed — hop ${data.hops}`);
      });

      // ── TYPING INDICATOR ──
      document.getElementById("message-input").addEventListener("input", () => {
        socket.emit("typing", username);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          socket.emit("stop typing");
        }, 1500);
      });

      socket.on("typing", (name) => {
        document.getElementById("typing-indicator").textContent =
          `${name} is typing...`;
      });

      socket.on("stop typing", () => {
        document.getElementById("typing-indicator").textContent = "";
      });

      // ── ADD MESSAGE TO SCREEN ──
      function addMessage(data, isMe) {
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.classList.add("message", isMe ? "mine" : "others");
        div.innerHTML = `
            <div class="name">${isMe ? "You" : data.username}</div>
            <div>${data.text}</div>
            <div class="time">${data.time}</div>
        `;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      // ── SYSTEM MESSAGES ──
      socket.on("user joined", (name) => {
        addSystemMessage(`${name} joined the chat 👋`);
      });

      socket.on("user left", (name) => {
        addSystemMessage(`${name} left the chat`);
      });

      function addSystemMessage(text) {
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.classList.add("system-msg");
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      // ── ONLINE COUNT ──
      socket.on("online count", (count) => {
        document.getElementById("online-count").textContent = count;
      });

      // ── SOUND NOTIFICATION ──
      function playSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.frequency.setValueAtTime(520, ctx.currentTime);
        oscillator.frequency.setValueAtTime(620, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.3);
      }
    </script>
  </body>
</html>
