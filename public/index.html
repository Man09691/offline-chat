<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #0d0d1a;
        --surface: #1a1a2e;
        --surface2: #16213e;
        --accent: #00d4ff;
        --accent2: #7b2fff;
        --text: #ffffff;
        --subtext: #8888aa;
        --bubble-me: #0f3460;
        --bubble-other: #1e1e3a;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── JOIN SCREEN ── */
      #join-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 20px;
        padding: 24px;
        animation: fadeIn 0.5s ease;
      }

      .logo {
        font-size: 52px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      #join-screen h1 {
        font-size: 26px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 800;
      }

      #join-screen p {
        color: var(--subtext);
        font-size: 14px;
      }

      #username-input {
        padding: 14px 22px;
        border-radius: 30px;
        border: 2px solid var(--accent);
        background: var(--surface);
        color: var(--text);
        font-size: 16px;
        outline: none;
        width: 280px;
        text-align: center;
        transition:
          border 0.3s,
          box-shadow 0.3s;
      }

      #username-input:focus {
        box-shadow: 0 0 12px rgba(0, 212, 255, 0.4);
      }

      #join-btn {
        padding: 14px 48px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
      }

      #join-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(0, 212, 255, 0.5);
      }

      #join-btn:active {
        transform: scale(0.97);
      }

      /* ── CHAT SCREEN ── */
      #chat-screen {
        display: none;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        animation: fadeIn 0.4s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── HEADER ── */
      #header {
        background: var(--surface2);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #0f3460;
      }

      #header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #header-left span {
        font-size: 22px;
      }

      #header-title {
        font-size: 17px;
        font-weight: bold;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      #header-sub {
        font-size: 11px;
        color: var(--subtext);
      }

      #online-badge {
        background: rgba(0, 212, 255, 0.15);
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
      }

      /* ── MESSAGES ── */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        scrollbar-width: thin;
        scrollbar-color: var(--surface2) transparent;
      }

      /* ── TYPING INDICATOR ── */
      #typing-indicator {
        padding: 0 16px 8px;
        font-size: 12px;
        color: var(--subtext);
        min-height: 22px;
        font-style: italic;
        transition: opacity 0.3s;
      }

      /* ── MESSAGE BUBBLES ── */
      .message {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.5;
        animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.85);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .message .name {
        font-size: 11px;
        font-weight: bold;
        margin-bottom: 4px;
        color: var(--accent);
      }

      .message .time {
        font-size: 10px;
        color: var(--subtext);
        margin-top: 4px;
        text-align: right;
      }

      .message.mine {
        background: linear-gradient(135deg, #0f3460, #1a2a5e);
        align-self: flex-end;
        border-bottom-right-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .message.others {
        background: var(--bubble-other);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .system-msg {
        text-align: center;
        font-size: 12px;
        color: var(--subtext);
        padding: 4px 12px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 20px;
        align-self: center;
        animation: fadeIn 0.3s ease;
      }

      /* ── INPUT AREA ── */
      #input-area {
        display: flex;
        padding: 12px 16px;
        gap: 10px;
        background: var(--surface2);
        border-top: 1px solid #0f3460;
      }

      #message-input {
        flex: 1;
        padding: 12px 18px;
        border-radius: 25px;
        border: 1px solid #0f3460;
        background: var(--surface);
        color: var(--text);
        font-size: 15px;
        outline: none;
        transition:
          border 0.3s,
          box-shadow 0.3s;
      }

      #message-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 8px rgba(0, 212, 255, 0.2);
      }

      #send-btn {
        padding: 12px 22px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        color: white;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        cursor: pointer;
        font-size: 18px;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
      }

      #send-btn:hover {
        transform: scale(1.05);
      }
      #send-btn:active {
        transform: scale(0.95);
      }

      #qr-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 16px;
        padding: 16px 24px;
      }

      #qr-label {
        font-size: 12px;
        color: var(--subtext);
      }

      #qr-code {
        background: white;
        padding: 10px;
        border-radius: 10px;
      }

      #qr-url {
        font-size: 11px;
        color: var(--accent);
        letter-spacing: 0.5px;
      }

      #file-btn {
        padding: 12px 14px;
        background: var(--surface);
        border: 1px solid #0f3460;
        border-radius: 25px;
        cursor: pointer;
        font-size: 16px;
        transition: transform 0.2s;
      }

      #file-btn:hover {
        transform: scale(1.1);
      }

      .file-message {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 18px;
        animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .file-message.mine {
        background: linear-gradient(135deg, #0f3460, #1a2a5e);
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }

      .file-message.others {
        background: var(--bubble-other);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }

      .file-message .name {
        font-size: 11px;
        font-weight: bold;
        margin-bottom: 6px;
        color: var(--accent);
      }

      .file-message img {
        max-width: 200px;
        max-height: 200px;
        border-radius: 10px;
        display: block;
        cursor: pointer;
      }

      .file-message .file-info {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }

      .file-message .file-icon {
        font-size: 24px;
      }

      .file-message .file-name {
        font-size: 13px;
        color: var(--text);
        word-break: break-all;
      }

      .file-message .download-btn {
        margin-top: 8px;
        padding: 6px 14px;
        background: var(--accent);
        color: #1a1a2e;
        border: none;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
        cursor: pointer;
        display: block;
      }

      .file-message .time {
        font-size: 10px;
        color: var(--subtext);
        margin-top: 6px;
        text-align: right;
      }
      .file-size {
        font-size: 11px;
        color: var(--subtext);
        margin-top: 4px;
      }

      #preview-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      #preview-box {
        background: var(--surface2);
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 20px;
        padding: 24px;
        width: 85%;
        max-width: 320px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      #preview-title {
        font-size: 16px;
        font-weight: bold;
        color: var(--accent);
      }

      #preview-content img {
        max-width: 200px;
        max-height: 200px;
        border-radius: 12px;
        object-fit: cover;
      }

      #preview-content .file-preview-icon {
        font-size: 56px;
        text-align: center;
      }

      #preview-info {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      #preview-name {
        font-size: 13px;
        color: var(--text);
        word-break: break-all;
        text-align: center;
      }

      #preview-size {
        font-size: 12px;
        color: var(--subtext);
      }

      #preview-buttons {
        display: flex;
        gap: 12px;
        width: 100%;
      }

      #preview-cancel {
        flex: 1;
        padding: 12px;
        background: transparent;
        border: 1px solid var(--subtext);
        border-radius: 25px;
        color: var(--subtext);
        font-size: 14px;
        cursor: pointer;
      }

      #preview-send {
        flex: 1;
        padding: 12px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border: none;
        border-radius: 25px;
        color: white;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
      }

      #users-panel {
        background: var(--surface2);
        border-bottom: 1px solid #0f3460;
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
      }

      #users-panel::-webkit-scrollbar {
        display: none;
      }

      .user-chip {
        padding: 4px 12px;
        background: rgba(0, 212, 255, 0.1);
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 20px;
        font-size: 12px;
        color: var(--accent);
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.2s;
      }

      .user-chip:hover {
        background: rgba(0, 212, 255, 0.25);
        transform: scale(1.05);
      }

      .user-chip.selected {
        background: var(--accent);
        color: #1a1a2e;
        font-weight: bold;
      }

      #private-indicator {
        padding: 4px 16px;
        font-size: 12px;
        color: #ffaa00;
        background: rgba(255, 170, 0, 0.1);
        border-top: 1px solid rgba(255, 170, 0, 0.2);
        display: none;
        align-items: center;
        justify-content: space-between;
      }

      #cancel-private {
        background: none;
        border: none;
        color: #ffaa00;
        cursor: pointer;
        font-size: 12px;
        font-weight: bold;
      }

      .private-bubble {
        border-left: 3px solid #ffaa00 !important;
      }

      .private-tag {
        font-size: 10px;
        color: #ffaa00;
        margin-bottom: 3px;
      }
    </style>
  </head>
  <body>
    <!-- JOIN SCREEN -->
    <div id="join-screen">
      <div class="logo">📡</div>
      <h1>Offline Chat</h1>
      <p>No internet • No server • Just WiFi</p>

      <!-- QR CODE BOX -->
      <div id="qr-container">
        <p id="qr-label">Scan to join from another device</p>
        <div id="qr-code"></div>
        <p id="qr-url"></p>
      </div>

      <input
        id="username-input"
        type="text"
        placeholder="Enter your name"
        maxlength="20"
      />
      <button id="join-btn">Join Chat →</button>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat-screen">
      <div id="header">
        <div id="header-left">
          <span>📡</span>
          <div>
            <div id="header-title">Offline Chat</div>
            <div id="header-sub">No Internet Used</div>
          </div>
        </div>
        <div id="online-badge">🟢 <span id="online-count">1</span> online</div>
      </div>
      <!-- ONLINE USERS PANEL -->
      <div id="users-panel">
        <div id="users-list"></div>
      </div>

      <div id="private-indicator">
        <span id="private-label"
          >🔒 Private message to: <b id="private-name"></b
        ></span>
        <button id="cancel-private">✕ Cancel</button>
      </div>

      <div id="messages"></div>
      <div id="typing-indicator"></div>

      <div id="input-area">
        <input
          id="file-input"
          type="file"
          accept="image/*,.pdf,.txt,.doc,.docx"
          style="display: none"
        />
        <button id="file-btn">📎</button>
        <input id="message-input" type="text" placeholder="Type a message..." />
        <button id="send-btn">➤</button>
      </div>
    </div>

    <!-- FILE PREVIEW MODAL -->
    <div id="preview-modal">
      <div id="preview-box">
        <p id="preview-title">Send this file?</p>
        <div id="preview-content"></div>
        <div id="preview-info">
          <span id="preview-name"></span>
          <span id="preview-size"></span>
        </div>
        <div id="preview-buttons">
          <button id="preview-cancel">Cancel</button>
          <button id="preview-send">Send ✓</button>
        </div>
      </div>
    </div>

    <script>
      const socket = io();

      // ── CRYPTO SETUP ──
      let myPublicKey = null;
      let myPrivateKey = null;
      let otherPublicKeys = {};
      let privateTarget = null; // who we're privately messaging

      // Check if encryption is supported (only works on localhost or HTTPS)
      const encryptionSupported = window.crypto && window.crypto.subtle;

      async function generateKeyPair() {
        if (!encryptionSupported) return;
        const keyPair = await window.crypto.subtle.generateKey(
          {
            name: "RSA-OAEP",
            modulusLength: 2048,
            publicExponent: new Uint8Array([1, 0, 1]),
            hash: "SHA-256",
          },
          true,
          ["encrypt", "decrypt"],
        );
        myPublicKey = keyPair.publicKey;
        myPrivateKey = keyPair.privateKey;
        console.log("🔑 Key pair generated!");
      }

      async function exportPublicKey(key) {
        const exported = await window.crypto.subtle.exportKey("spki", key);
        return btoa(String.fromCharCode(...new Uint8Array(exported)));
      }

      async function importPublicKey(keyStr) {
        const keyData = Uint8Array.from(atob(keyStr), (c) => c.charCodeAt(0));
        return await window.crypto.subtle.importKey(
          "spki",
          keyData,
          { name: "RSA-OAEP", hash: "SHA-256" },
          true,
          ["encrypt"],
        );
      }

      async function encryptMessage(message, publicKey) {
        if (!encryptionSupported || !publicKey) return message;
        const encoded = new TextEncoder().encode(message);
        const encrypted = await window.crypto.subtle.encrypt(
          { name: "RSA-OAEP" },
          publicKey,
          encoded,
        );
        return btoa(String.fromCharCode(...new Uint8Array(encrypted)));
      }

      async function decryptMessage(encryptedMessage) {
        if (!encryptionSupported || !myPrivateKey) return encryptedMessage;
        const encryptedData = Uint8Array.from(atob(encryptedMessage), (c) =>
          c.charCodeAt(0),
        );
        const decrypted = await window.crypto.subtle.decrypt(
          { name: "RSA-OAEP" },
          myPrivateKey,
          encryptedData,
        );
        return new TextDecoder().decode(decrypted);
      }

      let username = "";
      let typingTimeout;

      // ── GENERATE QR CODE ──
      async function generateQR() {
        try {
          const response = await fetch("/getip");
          const data = await response.json();
          const url = `http://${data.ip}:${data.port}`;
          document.getElementById("qr-url").textContent = url;
          new QRCode(document.getElementById("qr-code"), {
            text: url,
            width: 150,
            height: 150,
            colorDark: "#000000",
            colorLight: "#ffffff",
          });
        } catch (err) {
          document.getElementById("qr-container").style.display = "none";
        }
      }
      generateQR();

      // ── FORMAT FILE SIZE ──
      function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      }

      // ── FILE SHARING ──
      document.getElementById("file-btn").addEventListener("click", () => {
        document.getElementById("file-input").click();
      });

      document.getElementById("file-input").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (file.size > 5 * 1024 * 1024) {
          alert("File too large! Maximum size is 5MB.");
          return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
          const fileData = event.target.result;
          const isImage = file.type.startsWith("image/");

          const modal = document.getElementById("preview-modal");
          const content = document.getElementById("preview-content");

          if (isImage) {
            content.innerHTML = `<img src="${fileData}" />`;
          } else {
            content.innerHTML = `<div class="file-preview-icon">📄</div>`;
          }

          document.getElementById("preview-name").textContent = file.name;
          document.getElementById("preview-size").textContent = formatFileSize(
            file.size,
          );
          modal.style.display = "flex";

          document.getElementById("preview-cancel").onclick = () => {
            modal.style.display = "none";
          };

          document.getElementById("preview-send").onclick = () => {
            modal.style.display = "none";
            const data = {
              id: generateID(),
              username: username,
              fileName: file.name,
              fileType: file.type,
              fileSize: formatFileSize(file.size),
              fileData: fileData,
              time: new Date().toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
              }),
              hops: 0,
              maxHops: 5,
            };
            addFileMessage(data, true);
            socket.emit("file message", data);
          };
        };
        reader.readAsDataURL(file);
        e.target.value = "";
      });

      socket.on("file message", (data) => {
        addFileMessage(data, false);
        playSound();
        socket.emit("file message", data);
      });

      function addFileMessage(data, isMe) {
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.classList.add("file-message", isMe ? "mine" : "others");
        const isImage = data.fileType.startsWith("image/");
        if (isImage) {
          div.innerHTML = `
                <div class="name">${isMe ? "You" : data.username}</div>
                <img src="${data.fileData}" alt="${data.fileName}"
                     onclick="window.open('${data.fileData}', '_blank')" />
                <div class="file-size">🖼 ${data.fileName} • ${data.fileSize}</div>
                <button class="download-btn" onclick="downloadFile('${data.fileData}', '${data.fileName}')">⬇ Download</button>
                <div class="time">${data.time}</div>
            `;
        } else {
          div.innerHTML = `
                <div class="name">${isMe ? "You" : data.username}</div>
                <div class="file-info">
                    <span class="file-icon">📄</span>
                    <div>
                        <div class="file-name">${data.fileName}</div>
                        <div class="file-size">${data.fileSize}</div>
                    </div>
                </div>
                <button class="download-btn" onclick="downloadFile('${data.fileData}', '${data.fileName}')">⬇ Download</button>
                <div class="time">${data.time}</div>
            `;
        }
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      function downloadFile(fileData, fileName) {
        const a = document.createElement("a");
        a.href = fileData;
        a.download = fileName;
        a.click();
      }

      // ── JOIN ──
      document.getElementById("join-btn").addEventListener("click", joinChat);
      document
        .getElementById("username-input")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") joinChat();
        });

      async function joinChat() {
        try {
          const input = document.getElementById("username-input").value.trim();
          if (!input) return;
          username = input;

          document.getElementById("join-screen").style.display = "none";
          document.getElementById("chat-screen").style.display = "flex";

          if (encryptionSupported) {
            console.log("🔐 Encryption supported — generating keys...");
            await generateKeyPair();
            const publicKeyStr = await exportPublicKey(myPublicKey);
            socket.emit("share public key", {
              username: username,
              publicKey: publicKeyStr,
            });
            console.log("🔑 Keys generated and shared!");
          } else {
            // HTTP connection — crypto not available
            console.warn("⚠️ Encryption not available on HTTP");
            document.getElementById("header-sub").textContent =
              "⚠️ No Encryption (HTTP)";
            document.getElementById("header-sub").style.color = "#ffaa00";
          }

          socket.emit("user joined", username);
          console.log("✅ Joined as", username);
        } catch (err) {
          console.error("❌ Join failed:", err);
          alert("Something went wrong: " + err.message);
        }
      }

      // ── GENERATE ID ──
      function generateID() {
        return Math.random().toString(36).substr(2, 9) + Date.now();
      }

      // ── SEND MESSAGE ──
      document
        .getElementById("send-btn")
        .addEventListener("click", sendMessage);
      document
        .getElementById("message-input")
        .addEventListener("keypress", (e) => {
          if (e.key === "Enter") sendMessage();
        });

      async function sendMessage() {
        const input = document.getElementById("message-input");
        const text = input.value.trim();
        if (!text) return;

        const baseData = {
          id: generateID(),
          username: username,
          text: text,
          time: new Date().toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          }),
          hops: 0,
          maxHops: 5,
        };

        if (privateTarget) {
          // ── PRIVATE MESSAGE ──
          const privateData = {
            ...baseData,
            private: true,
            to: privateTarget,
          };

          // Show on my screen
          addMessage(
            { ...privateData, text: `🔒 Private to ${privateTarget}: ${text}` },
            true,
            true,
          );

          // Encrypt if possible
          if (encryptionSupported && otherPublicKeys[privateTarget]) {
            const encryptedText = await encryptMessage(
              text,
              otherPublicKeys[privateTarget],
            );
            socket.emit("chat message", {
              ...privateData,
              text: encryptedText,
              encrypted: true,
            });
          } else {
            socket.emit("chat message", privateData);
          }
        } else {
          // ── GROUP MESSAGE ──
          addMessage(baseData, true);

          if (encryptionSupported && Object.keys(otherPublicKeys).length > 0) {
            for (const [user, publicKey] of Object.entries(otherPublicKeys)) {
              try {
                const encryptedText = await encryptMessage(text, publicKey);
                socket.emit("chat message", {
                  ...baseData,
                  id: generateID(),
                  text: encryptedText,
                  encrypted: true,
                  to: user,
                });
              } catch (err) {
                console.error(`Encryption failed for ${user}:`, err);
              }
            }
          } else {
            socket.emit("chat message", baseData);
          }
        }

        socket.emit("stop typing");
        input.value = "";
      }

      // ── RECEIVE MESSAGE ──
      socket.on("chat message", async (data) => {
        // Not for me — relay and stop
        if (data.to && data.to !== username) {
          socket.emit("chat message", data);
          return;
        }

        let messageText = data.text;

        // Decrypt if needed
        if (data.encrypted && encryptionSupported) {
          try {
            messageText = await decryptMessage(data.text);
          } catch (err) {
            messageText = "🔒 Could not decrypt";
          }
        }

        const displayData = { ...data, text: messageText };

        // Show with private styling if private message
        addMessage(displayData, false, data.private);
        playSound();

        // Relay forward
        socket.emit("chat message", data);
      });

      // ── RELAY CONFIRMATION ──
      socket.on("message relayed", (data) => {
        console.log(`✅ Relayed — hop ${data.hops}`);
      });

      // ── PUBLIC KEY SHARING ──
      socket.on("public key shared", async (data) => {
        if (data.username !== username) {
          otherPublicKeys[data.username] = await importPublicKey(
            data.publicKey,
          );
          console.log(`🔑 Got public key from ${data.username}`);
        }
      });

      // ── USER LIST ──
      socket.on("user list", (userList) => {
        const panel = document.getElementById("users-list");
        panel.innerHTML = "";
        userList.forEach((user) => {
          if (user === username) return; // skip yourself
          const chip = document.createElement("div");
          chip.classList.add("user-chip");
          chip.textContent = "👤 " + user;
          chip.addEventListener("click", () => {
            // Select private target
            privateTarget = user;
            document
              .querySelectorAll(".user-chip")
              .forEach((c) => c.classList.remove("selected"));
            chip.classList.add("selected");
            // Show indicator
            document.getElementById("private-name").textContent = user;
            document.getElementById("private-indicator").style.display = "flex";
            document.getElementById("message-input").placeholder =
              `Private to ${user}...`;
            document.getElementById("message-input").focus();
          });
          panel.appendChild(chip);
        });
      });

      // Cancel private message
      document
        .getElementById("cancel-private")
        .addEventListener("click", () => {
          privateTarget = null;
          document
            .querySelectorAll(".user-chip")
            .forEach((c) => c.classList.remove("selected"));
          document.getElementById("private-indicator").style.display = "none";
          document.getElementById("message-input").placeholder =
            "Type a message...";
        });

      socket.on("all public keys", async (keys) => {
        for (const [user, keyStr] of Object.entries(keys)) {
          if (user !== username) {
            otherPublicKeys[user] = await importPublicKey(keyStr);
            console.log(`🔑 Imported key for ${user}`);
          }
        }
      });

      // ── TYPING INDICATOR ──
      document.getElementById("message-input").addEventListener("input", () => {
        socket.emit("typing", username);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          socket.emit("stop typing");
        }, 1500);
      });

      socket.on("typing", (name) => {
        document.getElementById("typing-indicator").textContent =
          `${name} is typing...`;
      });

      socket.on("stop typing", () => {
        document.getElementById("typing-indicator").textContent = "";
      });

      // ── ADD MESSAGE TO SCREEN ──
      function addMessage(data, isMe, isPrivate = false) {
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.classList.add("message", isMe ? "mine" : "others");
        if (data.private || isPrivate) div.classList.add("private-bubble");
        div.innerHTML = `
        ${data.private || isPrivate ? `<div class="private-tag">🔒 Private</div>` : ""}
        <div class="name">${isMe ? "You" : data.username}</div>
        <div>${data.text}</div>
        <div class="time">${data.time}</div>
    `;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      // ── SYSTEM MESSAGES ──
      socket.on("user joined", (name) => {
        addSystemMessage(`${name} joined the chat 👋`);
      });

      socket.on("user left", (name) => {
        addSystemMessage(`${name} left the chat`);
      });

      function addSystemMessage(text) {
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.classList.add("system-msg");
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      // ── ONLINE COUNT ──
      socket.on("online count", (count) => {
        document.getElementById("online-count").textContent = count;
      });

      // ── SOUND NOTIFICATION ──
      function playSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.frequency.setValueAtTime(520, ctx.currentTime);
        oscillator.frequency.setValueAtTime(620, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.3);
      }
    </script>
  </body>
</html>
